# AeroVision AI Configuration File
# Settings for model training and deployment

# Training Configuration
[training]
# Model variants: yolov8n (nano), yolov8s (small), yolov8m (medium), yolov8l (large)
model_variant = yolov8s
epochs = 100
batch_size = 16
image_size = 640
learning_rate = 0.01
patience = 20
device = 0  # GPU device ID, -1 for CPU
amp = True  # Automatic Mixed Precision
save_period = 5  # Save checkpoint every N epochs
cache = True  # Cache images for faster training

# Data Configuration
[data]
dataset_path = ./NEU-DET
train_split = 0.8
val_split = 0.1
test_split = 0.1
num_classes = 6
image_format = jpg

# Defect Classes (NEU-DET to Aircraft Mapping)
[classes]
0 = crack
1 = inclusion
2 = corrosion
3 = surface_wear
4 = delamination
5 = scratch

# Model Export Configuration
[export]
export_formats = onnx,engine,tflite
onnx_export = True
engine_export = False  # Requires CUDA/TensorRT
simplify_onnx = True
half_precision = False

# Flask Web Configuration
[flask]
host = 0.0.0.0
port = 5000
debug = True
max_file_size = 16  # MB
upload_folder = static/uploads
results_folder = static/results

# Inference Configuration
[inference]
confidence_threshold = 0.25
iou_threshold = 0.45
max_detections = 100
save_results = True
annotate_results = True

# Deployment Configuration
[deployment]
jetson_nano_support = True
edge_device = jetson_nano  # Options: jetson_nano, raspberry_pi, x86_cpu
quantization = False
model_compression = False
